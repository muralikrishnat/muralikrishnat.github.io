<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassflow - Advanced Flow Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-blur: blur(12px);
      --accent: #6366f1;
      --node-width: 180px;
      --header-height: 45px;
      --port-row-height: 32px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
      color: #f8fafc;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
    }

    .canvas-container {
      cursor: grab;
      background-image:
        radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 30px 30px;
    }

    .canvas-container:active {
      cursor: grabbing;
    }

    .node {
      position: absolute;
      width: var(--node-width);
      z-index: 10;
      transition: box-shadow 0.2s;
      cursor: pointer;
    }

    .node:hover {
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
    }

    .node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
    }

    .port {
      width: 12px;
      height: 12px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 50%;
      position: absolute;
      z-index: 20;
      cursor: crosshair;
      transition: transform 0.2s;
    }

    .port:hover {
      transform: scale(1.3);
      background: var(--accent);
    }

    .port-label {
      position: absolute;
      font-size: 10px;
      color: #94a3b8;
      white-space: nowrap;
    }

    svg#connections-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .connection-line {
      fill: none;
      stroke: rgba(255, 255, 255, 0.4);
      stroke-width: 2.5;
      pointer-events: stroke;
      cursor: pointer;
      transition: stroke 0.2s;
    }

    .connection-line:hover {
      stroke: var(--accent);
      stroke-width: 4;
    }

    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s;
    }

    .node:hover .delete-btn {
      opacity: 1;
    }

    #zoom-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      color: #64748b;
    }

    .port-row {
      height: var(--port-row-height);
    }
  </style>
</head>

<body class="flex flex-col">

  <!-- Header / Navbar -->
  <header class="h-16 glass m-2 flex items-center justify-between px-6 z-50">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i class="fas fa-project-diagram text-white text-xl"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Glass<span class="text-indigo-400">Flow</span></h1>
    </div>

    <div class="flex gap-3">
      <button onclick="zoomCanvas(0.1)" class="p-2 hover:bg-white/10 rounded-lg transition" title="Zoom In">
        <i class="fas fa-search-plus"></i>
      </button>
      <button onclick="zoomCanvas(-0.1)" class="p-2 hover:bg-white/10 rounded-lg transition" title="Zoom Out">
        <i class="fas fa-search-minus"></i>
      </button>
      <button onclick="resetZoom()" class="p-2 hover:bg-white/10 rounded-lg transition" title="Reset Zoom">
        <i class="fas fa-compress"></i>
      </button>
      <div class="w-px h-6 bg-white/10 mx-2 self-center"></div>
      <button onclick="toggleJSONWindow()"
        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition flex items-center gap-2">
        <i class="fas fa-code"></i> JSON Data
      </button>
    </div>
  </header>

  <main class="flex flex-1 overflow-hidden p-2 gap-2">
    <aside class="w-72 glass flex flex-col overflow-hidden">
      <div class="p-4 border-b border-white/10">
        <h2 class="font-semibold text-sm uppercase tracking-wider text-slate-400">Node Library</h2>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="space-y-3">
          <h3 class="text-xs font-bold text-slate-500 uppercase">Logic & Control</h3>
          <div class="grid gap-2">
            <div draggable="true" ondragstart="onDragStart(event, 'trigger')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-bolt text-yellow-400"></i>
              <span class="text-sm">Start Trigger</span>
            </div>
            <div draggable="true" ondragstart="onDragStart(event, 'condition')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-code-branch text-blue-400"></i>
              <span class="text-sm">If/Else Condition</span>
            </div>
            <div draggable="true" ondragstart="onDragStart(event, 'switch')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-random text-purple-400"></i>
              <span class="text-sm">Switch Node</span>
            </div>
          </div>
        </div>
        <div class="space-y-3">
          <h3 class="text-xs font-bold text-slate-500 uppercase">Actions</h3>
          <div class="grid gap-2">
            <div draggable="true" ondragstart="onDragStart(event, 'http')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-globe text-emerald-400"></i>
              <span class="text-sm">HTTP Request</span>
            </div>
            <div draggable="true" ondragstart="onDragStart(event, 'email')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-envelope text-pink-400"></i>
              <span class="text-sm">Send Email</span>
            </div>
            <div draggable="true" ondragstart="onDragStart(event, 'log')"
              class="node-item glass p-3 flex items-center gap-3 hover:bg-white/5 rounded-lg">
              <i class="fas fa-terminal text-slate-300"></i>
              <span class="text-sm">Log Message</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <div class="flex-1 glass relative overflow-hidden canvas-container" id="artboard-container">
      <div id="artboard" class="absolute inset-0 origin-top-left">
        <svg id="connections-layer"></svg>
      </div>
      <div id="zoom-indicator">Zoom: 100%</div>
    </div>
  </main>

  <!-- Node Editor Modal -->
  <div id="node-modal" class="hidden fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
    <div class="glass w-full max-w-lg shadow-2xl overflow-hidden flex flex-col">
      <div class="p-6 border-b border-white/10 flex justify-between items-center">
        <h3 class="text-xl font-semibold flex items-center gap-3">
          <i id="modal-icon" class="fas fa-cog text-indigo-400"></i>
          Edit Node
        </h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white transition">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto max-h-[70vh] space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Step Name</label>
          <input type="text" id="edit-node-name"
            class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-indigo-500 transition">
        </div>
        <div class="p-4 bg-white/5 rounded-xl border border-white/5">
          <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Connections</label>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <span class="text-[10px] text-slate-500 uppercase">Inputs</span>
              <div id="modal-inputs" class="text-sm mt-1 text-slate-300">None</div>
            </div>
            <div>
              <span class="text-[10px] text-slate-500 uppercase">Outputs</span>
              <div id="modal-outputs" class="text-sm mt-1 text-slate-300">None</div>
            </div>
          </div>
        </div>
        <div id="special-config" class="hidden space-y-4 pt-4 border-t border-white/10">
          <div class="flex justify-between items-center">
            <label class="block text-xs font-bold text-slate-400 uppercase">Outputs</label>
            <button onclick="addSwitchOption()"
              class="text-xs bg-emerald-600/20 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/30 hover:bg-emerald-600/40 transition">
              <i class="fas fa-plus mr-1"></i> Add Option
            </button>
          </div>
          <div id="switch-options-container" class="space-y-2"></div>
        </div>
      </div>
      <div class="p-6 border-t border-white/10 flex justify-end gap-3 bg-white/5">
        <button onclick="closeModal()"
          class="px-6 py-2 rounded-lg hover:bg-white/5 transition font-medium">Cancel</button>
        <button onclick="saveNodeDetails()"
          class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- JSON Import/Export Window -->
  <div id="json-window" class="hidden fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
    <div class="glass w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
      <div class="p-6 border-b border-white/10 flex justify-between items-center">
        <h3 class="text-xl font-semibold flex items-center gap-3">
          <i class="fas fa-code text-indigo-400"></i> Flow JSON
        </h3>
        <button onclick="toggleJSONWindow()" class="text-slate-400 hover:text-white transition">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <textarea id="json-textarea" spellcheck="false"
          class="w-full h-80 bg-slate-900/50 border border-white/10 rounded-lg p-4 font-mono text-xs text-indigo-300 outline-none focus:border-indigo-500 transition"></textarea>
      </div>
      <div class="p-6 border-t border-white/10 flex justify-end gap-3 bg-white/5">
        <button onclick="importJSON()"
          class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition">Import & Apply</button>
      </div>
    </div>
  </div>

  <script>
    // --- Constants for precise alignment ---
    const NODE_WIDTH = 180;
    const HEADER_HEIGHT = 45;
    const PORT_ROW_HEIGHT = 32;
    const PORT_OFFSET_Y = 16; // Half of row height
    const PORT_RADIUS = 6; // Half of port diameter

    let nodes = [];
    let connections = [];
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isDraggingCanvas = false;
    let lastMouseX, lastMouseY;
    let activeNodeId = null;
    let activePort = null;
    let tempLine = null;

    const artboard = document.getElementById('artboard');
    const artboardContainer = document.getElementById('artboard-container');
    const svgLayer = document.getElementById('connections-layer');

    const NODE_TYPES = {
      trigger: { icon: 'fa-bolt', color: 'text-yellow-400', outputs: 1, category: 'Logic' },
      condition: { icon: 'fa-code-branch', color: 'text-blue-400', outputs: 2, category: 'Logic', labels: ['True', 'False'] },
      switch: { icon: 'fa-random', color: 'text-purple-400', outputs: 3, category: 'Logic', labels: ['Option 1', 'Option 2', 'Option 3'] },
      http: { icon: 'fa-globe', color: 'text-emerald-400', outputs: 1, category: 'Actions' },
      email: { icon: 'fa-envelope', color: 'text-pink-400', outputs: 1, category: 'Actions' },
      log: { icon: 'fa-terminal', color: 'text-slate-300', outputs: 1, category: 'Actions' }
    };

    function init() {
      setupCanvasControls();
      setupWindowResize();
      createNode('trigger', 100, 100);
      renderNodes();
      renderConnections();
    }

    function setupCanvasControls() {
      artboardContainer.addEventListener('mousedown', (e) => {
        if (e.target === artboardContainer || e.target === artboard || e.target.tagName === 'svg') {
          isDraggingCanvas = true;
          lastMouseX = e.clientX;
          lastMouseY = e.clientY;
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMouseX;
          const dy = e.clientY - lastMouseY;
          panX += dx;
          panY += dy;
          lastMouseX = e.clientX;
          lastMouseY = e.clientY;
          updateCanvasTransform();
        }
        if (activePort && activePort.type === 'output') {
          drawTempLine(e);
        }
      });

      window.addEventListener('mouseup', () => {
        isDraggingCanvas = false;
        if (activePort) {
          activePort = null;
          if (tempLine) tempLine.remove();
          tempLine = null;
        }
      });

      artboardContainer.addEventListener('wheel', (e) => {
        e.preventDefault();
        zoomCanvas(e.deltaY > 0 ? -0.05 : 0.05);
      }, { passive: false });
    }

    function zoomCanvas(delta) {
      zoom = Math.min(Math.max(0.3, zoom + delta), 2);
      updateCanvasTransform();
      document.getElementById('zoom-indicator').innerText = `Zoom: ${Math.round(zoom * 100)}%`;
    }

    function resetZoom() {
      zoom = 1; panX = 0; panY = 0;
      updateCanvasTransform();
      document.getElementById('zoom-indicator').innerText = `Zoom: 100%`;
    }

    function updateCanvasTransform() {
      artboard.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    function setupWindowResize() {
      window.addEventListener('resize', renderConnections);
    }

    function onDragStart(e, type) {
      e.dataTransfer.setData('nodeType', type);
    }

    artboardContainer.addEventListener('dragover', (e) => e.preventDefault());
    artboardContainer.addEventListener('drop', (e) => {
      e.preventDefault();
      const type = e.dataTransfer.getData('nodeType');
      const rect = artboard.getBoundingClientRect();
      const x = (e.clientX - rect.left) / zoom;
      const y = (e.clientY - rect.top) / zoom;
      createNode(type, x, y);
    });

    function createNode(type, x, y) {
      const id = 'node_' + Math.random().toString(36).substr(2, 9);
      const nodeDef = NODE_TYPES[type];
      nodes.push({
        id, type, x, y,
        name: type.charAt(0).toUpperCase() + type.slice(1),
        config: {},
        outputs: nodeDef.outputs || 1,
        outputLabels: nodeDef.labels || Array.from({ length: nodeDef.outputs || 1 }, (_, i) => `Out ${i + 1}`)
      });
      renderNodes();
      renderConnections();
    }

    function deleteNode(e, id) {
      e.stopPropagation();
      nodes = nodes.filter(n => n.id !== id);
      connections = connections.filter(c => c.fromId !== id && c.toId !== id);
      renderNodes();
      renderConnections();
    }

    function onNodeMouseDown(e, id) {
      e.stopPropagation();
      const node = nodes.find(n => n.id === id);
      let startX = e.clientX;
      let startY = e.clientY;

      const moveNode = (me) => {
        node.x += (me.clientX - startX) / zoom;
        node.y += (me.clientY - startY) / zoom;
        startX = me.clientX;
        startY = me.clientY;
        const element = document.getElementById(id);
        element.style.left = node.x + 'px';
        element.style.top = node.y + 'px';
        renderConnections();
      };

      const stopMove = () => {
        window.removeEventListener('mousemove', moveNode);
        window.removeEventListener('mouseup', stopMove);
      };
      window.addEventListener('mousemove', moveNode);
      window.addEventListener('mouseup', stopMove);
    }

    // --- Logic to get exact Port coordinates ---
    function getPortCoords(nodeId, portIndex, type) {
      const node = nodes.find(n => n.id === nodeId);
      if (!node) return { x: 0, y: 0 };

      if (type === 'input') {
        return {
          x: node.x,
          y: node.y + HEADER_HEIGHT + PORT_OFFSET_Y
        };
      } else {
        // Outputs are listed after the single input row
        return {
          x: node.x + NODE_WIDTH,
          y: node.y + HEADER_HEIGHT + PORT_ROW_HEIGHT + (portIndex * PORT_ROW_HEIGHT) + PORT_OFFSET_Y
        };
      }
    }

    function onPortMouseDown(e, nodeId, portIndex, type) {
      e.stopPropagation();
      activePort = { nodeId, portIndex, type };
      if (type === 'output') {
        tempLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
        tempLine.setAttribute("class", "connection-line stroke-indigo-400 opacity-50");
        tempLine.setAttribute("stroke-dasharray", "5,5");
        svgLayer.appendChild(tempLine);
      }
    }

    function onPortMouseUp(e, nodeId, portIndex, type) {
      if (!activePort) return;
      if (activePort.type === 'output' && type === 'input' && activePort.nodeId !== nodeId) {
        connections = connections.filter(c => !(c.fromId === activePort.nodeId && c.fromPort === activePort.portIndex));
        connections.push({
          id: 'conn_' + Math.random().toString(36).substr(2, 9),
          fromId: activePort.nodeId,
          fromPort: activePort.portIndex,
          toId: nodeId,
          toPort: portIndex
        });
        renderConnections();
      }
      activePort = null;
    }

    function drawTempLine(e) {
      const rect = artboard.getBoundingClientRect();
      const start = getPortCoords(activePort.nodeId, activePort.portIndex, 'output');
      const endX = (e.clientX - rect.left) / zoom;
      const endY = (e.clientY - rect.top) / zoom;
      const d = `M ${start.x} ${start.y} C ${start.x + 50} ${start.y}, ${endX - 50} ${endY}, ${endX} ${endY}`;
      tempLine.setAttribute("d", d);
    }

    function deleteConnection(connId) {
      connections = connections.filter(c => c.id !== connId);
      renderConnections();
    }

    function renderNodes() {
      document.querySelectorAll('.node').forEach(n => n.remove());
      nodes.forEach(node => {
        const nodeDef = NODE_TYPES[node.type];
        const div = document.createElement('div');
        div.id = node.id;
        div.className = `node glass p-0 overflow-hidden flex flex-col border border-white/10`;
        div.style.left = node.x + 'px';
        div.style.top = node.y + 'px';
        div.onmousedown = (e) => onNodeMouseDown(e, node.id);
        div.ondblclick = () => openModal(node.id);

        let outputsHtml = '';
        for (let i = 0; i < node.outputs; i++) {
          outputsHtml += `
                        <div class="port-row relative flex items-center justify-end px-3">
                            <span class="port-label mr-4">${node.outputLabels[i] || ''}</span>
                            <div class="port" style="right: -6px;" 
                                onmousedown="onPortMouseDown(event, '${node.id}', ${i}, 'output')"
                                onmouseup="onPortMouseUp(event, '${node.id}', ${i}, 'output')">
                            </div>
                        </div>
                    `;
        }

        div.innerHTML = `
                    <div class="h-[45px] p-3 bg-white/5 border-b border-white/10 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="fas ${nodeDef.icon} ${nodeDef.color}"></i>
                            <span class="text-xs font-bold truncate max-w-[110px]">${node.name}</span>
                        </div>
                        <button onclick="deleteNode(event, '${node.id}')" class="delete-btn text-slate-500 hover:text-red-400">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    </div>
                    <div class="flex-1">
                        <div class="port-row relative flex items-center px-3">
                            <div class="port" style="left: -6px;"
                                onmousedown="onPortMouseDown(event, '${node.id}', 0, 'input')"
                                onmouseup="onPortMouseUp(event, '${node.id}', 0, 'input')">
                            </div>
                            <span class="text-[10px] text-slate-500 ml-2">Input</span>
                        </div>
                        ${outputsHtml}
                    </div>
                `;
        artboard.appendChild(div);
      });
    }

    function renderConnections() {
      svgLayer.innerHTML = '';
      connections.forEach(conn => {
        const start = getPortCoords(conn.fromId, conn.fromPort, 'output');
        const end = getPortCoords(conn.toId, conn.toPort, 'input');

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const d = `M ${start.x} ${start.y} C ${start.x + 60} ${start.y}, ${end.x - 60} ${end.y}, ${end.x} ${end.y}`;
        path.setAttribute("d", d);
        path.setAttribute("class", "connection-line");
        path.onclick = () => deleteConnection(conn.id);
        svgLayer.appendChild(path);
      });
    }

    function openModal(nodeId) {
      activeNodeId = nodeId;
      const node = nodes.find(n => n.id === nodeId);
      if (!node) return;
      document.getElementById('edit-node-name').value = node.name;
      const specialSection = document.getElementById('special-config');
      const switchContainer = document.getElementById('switch-options-container');
      switchContainer.innerHTML = '';

      if (node.type === 'switch' || node.type === 'condition') {
        specialSection.classList.remove('hidden');
        node.outputLabels.forEach((label, idx) => {
          const row = document.createElement('div');
          row.className = 'flex gap-2 items-center';
          row.innerHTML = `
                        <input type="text" value="${label}" class="flex-1 bg-white/5 border border-white/10 rounded p-2 text-xs" onchange="updateLabel(${idx}, this.value)">
                        ${node.type === 'switch' ? `<button onclick="removeSwitchOption(${idx})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    `;
          switchContainer.appendChild(row);
        });
      } else {
        specialSection.classList.add('hidden');
      }
      document.getElementById('node-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('node-modal').classList.add('hidden'); }
    function addSwitchOption() {
      const node = nodes.find(n => n.id === activeNodeId);
      node.outputs++;
      node.outputLabels.push(`Option ${node.outputs}`);
      openModal(activeNodeId);
    }
    function removeSwitchOption(idx) {
      const node = nodes.find(n => n.id === activeNodeId);
      if (node.outputs <= 1) return;
      node.outputs--;
      node.outputLabels.splice(idx, 1);
      connections = connections.filter(c => !(c.fromId === activeNodeId && c.fromPort === idx));
      connections.forEach(c => { if (c.fromId === activeNodeId && c.fromPort > idx) c.fromPort--; });
      openModal(activeNodeId);
    }
    function updateLabel(idx, val) { nodes.find(n => n.id === activeNodeId).outputLabels[idx] = val; }
    function saveNodeDetails() {
      nodes.find(n => n.id === activeNodeId).name = document.getElementById('edit-node-name').value;
      renderNodes(); renderConnections(); closeModal();
    }
    function toggleJSONWindow() {
      const win = document.getElementById('json-window');
      if (win.classList.contains('hidden')) {
        document.getElementById('json-textarea').value = JSON.stringify({ nodes, connections }, null, 2);
        win.classList.remove('hidden');
      } else { win.classList.add('hidden'); }
    }
    function importJSON() {
      try {
        const data = JSON.parse(document.getElementById('json-textarea').value);
        nodes = data.nodes || []; connections = data.connections || [];
        renderNodes(); renderConnections(); toggleJSONWindow();
      } catch (e) { console.error(e); }
    }

    window.onload = init;
  </script>
</body>
