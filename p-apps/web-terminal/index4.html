<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoTerm — Web Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --glass-bg: rgba(10, 15, 30, 0.72);
      --glass-border: rgba(99, 179, 237, 0.18);
      --glass-shine: rgba(147, 210, 255, 0.06);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --text-primary: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #334155;
      --bg-deep: #030712;
      --bg-panel: rgba(8, 14, 28, 0.85);
      --success: #4ade80;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(56, 189, 248, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(129, 140, 248, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(52, 211, 153, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2338bdf8' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .app-root {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Glass morphism base */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-border);
    }

    .glass-light {
      background: rgba(14, 22, 45, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(99, 179, 237, 0.10);
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: rgba(5, 10, 22, 0.92);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--accent2);
    }

    /* ===== TABS ===== */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid transparent;
      transition: all 0.18s ease;
      white-space: nowrap;
      flex-shrink: 0;
      position: relative;
      background: rgba(255, 255, 255, 0.02);
    }

    .tab:hover {
      color: var(--text-primary);
      background: rgba(56, 189, 248, 0.07);
      border-color: rgba(56, 189, 248, 0.15);
    }

    .tab.active {
      background: rgba(56, 189, 248, 0.12);
      border-color: rgba(56, 189, 248, 0.3);
      color: var(--accent);
    }

    .tab .tab-close {
      opacity: 0;
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      transition: all 0.15s;
      color: var(--text-muted);
    }

    .tab:hover .tab-close {
      opacity: 1;
    }

    .tab .tab-close:hover {
      background: rgba(248, 113, 113, 0.2);
      color: var(--danger);
    }

    .tab-add-btn {
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      border: 1px dashed rgba(99, 179, 237, 0.2);
      transition: all 0.18s;
      flex-shrink: 0;
      background: transparent;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tab-add-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.06);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      padding: 5px 7px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.18s;
      border: 1px solid transparent;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .icon-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--glass-border);
    }

    .icon-btn.active {
      color: var(--accent);
      background: rgba(56, 189, 248, 0.1);
      border-color: rgba(56, 189, 248, 0.3);
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      background: rgba(5, 10, 22, 0.6);
      backdrop-filter: blur(20px);
      overflow: hidden;
      transition: width 0.25s ease;
    }

    .sidebar.collapsed {
      width: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 10px 12px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--text-dim) transparent;
    }

    .folder-item {
      cursor: pointer;
    }

    .folder-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.15s;
      user-select: none;
    }

    .folder-header:hover {
      color: var(--text-primary);
      background: rgba(56, 189, 248, 0.05);
    }

    .folder-header.open {
      color: var(--accent2);
    }

    .folder-name {
      flex: 1;
      font-weight: 500;
    }

    .folder-count {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 10px;
      background: rgba(99, 179, 237, 0.1);
      color: var(--text-muted);
    }

    .folder-commands {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.2s ease;
    }

    .folder-commands.open {
      max-height: 400px;
    }

    .cmd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px 5px 28px;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .cmd-item:hover {
      color: var(--text-primary);
      background: rgba(56, 189, 248, 0.07);
      border-left-color: var(--accent);
    }

    .cmd-item .cmd-name {
      flex: 1;
    }

    .cmd-item .cmd-run {
      opacity: 0;
      font-size: 9px;
      color: var(--accent);
    }

    .cmd-item:hover .cmd-run {
      opacity: 1;
    }

    /* ===== TERMINAL AREA ===== */
    .terminal-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Split container */
    .split-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .split-container.vertical {
      flex-direction: row;
    }

    .split-container.horizontal {
      flex-direction: column;
    }

    .terminal-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      border: 1px solid transparent;
      transition: border-color 0.15s;
      min-width: 0;
      min-height: 0;
    }

    .terminal-pane.focused {
      border-color: rgba(56, 189, 248, 0.25);
    }

    .pane-topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(5, 10, 22, 0.5);
      border-bottom: 1px solid var(--glass-border);
      font-size: 9px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .pane-topbar .pane-title {
      flex: 1;
    }

    .split-divider {
      width: 4px;
      background: var(--glass-border);
      cursor: col-resize;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .split-divider:hover,
    .split-divider.dragging {
      background: var(--accent);
    }

    .split-divider.horiz {
      width: auto;
      height: 4px;
      cursor: row-resize;
    }

    /* ===== HISTORY PANEL ===== */
    .history-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--text-dim) transparent;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-entry {
      border-radius: 8px;
      border: 1px solid rgba(99, 179, 237, 0.1);
      background: rgba(10, 18, 38, 0.5);
      overflow: hidden;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .history-entry:hover {
      border-color: rgba(56, 189, 248, 0.25);
      background: rgba(14, 22, 48, 0.7);
    }

    .history-entry.expanded {
      border-color: rgba(56, 189, 248, 0.3);
    }

    .history-cmd-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
    }

    .status-tag {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .status-tag.success {
      background: rgba(74, 222, 128, 0.15);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .status-tag.error {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .status-tag.running {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.3);
      animation: pulse 1.5s infinite;
    }

    .status-tag.warn {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warn);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .history-cmd-text {
      flex: 1;
      font-size: 12px;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }

    .history-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .history-entry:hover .history-actions {
      opacity: 1;
    }

    .mini-btn {
      padding: 3px 6px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 3px;
      font-family: 'JetBrains Mono', monospace;
    }

    .mini-btn:hover {
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent);
      border-color: rgba(56, 189, 248, 0.2);
    }

    .mini-btn.danger:hover {
      background: rgba(248, 113, 113, 0.1);
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.2);
    }

    .history-output {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .history-entry.expanded .history-output {
      max-height: 300px;
    }

    .history-output-inner {
      padding: 10px 14px;
      border-top: 1px solid rgba(99, 179, 237, 0.08);
      font-size: 11px;
      line-height: 1.7;
      color: #94a3b8;
      background: rgba(2, 5, 15, 0.4);
      overflow-y: auto;
      max-height: 280px;
      scrollbar-width: thin;
      scrollbar-color: var(--text-dim) transparent;
    }

    .output-line {
      display: flex;
    }

    .output-line.err {
      color: var(--danger);
    }

    .output-line.info {
      color: var(--accent2);
    }

    .output-line .source-tag {
      font-size: 9px;
      color: var(--text-dim);
      margin-right: 8px;
      flex-shrink: 0;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.03);
    }

    /* ===== COMMAND INPUT ===== */
    .input-area {
      flex-shrink: 0;
      background: rgba(5, 10, 22, 0.88);
      border-top: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      flex-wrap: wrap;
    }

    .info-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
    }

    .info-chip.cwd {
      background: rgba(52, 211, 153, 0.12);
      color: var(--accent3);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .info-chip.branch {
      background: rgba(129, 140, 248, 0.12);
      color: var(--accent2);
      border: 1px solid rgba(129, 140, 248, 0.2);
    }

    .info-chip.mode {
      background: rgba(251, 191, 36, 0.12);
      color: var(--warn);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    .suggestions-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 10px;
      color: var(--text-muted);
      border: 1px solid rgba(99, 179, 237, 0.12);
      background: rgba(56, 189, 248, 0.04);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      color: var(--accent);
      border-color: rgba(56, 189, 248, 0.3);
      background: rgba(56, 189, 248, 0.1);
    }

    .suggestion-label {
      font-size: 8px;
      color: var(--text-dim);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-symbol {
      font-size: 16px;
      color: var(--accent3);
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }

    .cmd-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(99, 179, 237, 0.2);
      border-radius: 7px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.18s;
      caret-color: var(--accent);
    }

    .cmd-input:focus {
      border-color: rgba(56, 189, 248, 0.5);
      background: rgba(56, 189, 248, 0.05);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08);
    }

    .cmd-input::placeholder {
      color: var(--text-dim);
    }

    .exec-modes {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .mode-btn {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .mode-btn:hover {
      color: var(--text-primary);
      border-color: var(--glass-border);
    }

    .mode-btn.active-seq {
      color: var(--warn);
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.25);
    }

    .mode-btn.active-par {
      color: var(--accent2);
      background: rgba(129, 140, 248, 0.1);
      border-color: rgba(129, 140, 248, 0.25);
    }

    .run-btn {
      padding: 8px 16px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      border: none;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.9), rgba(99, 102, 241, 0.9));
      color: white;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    }

    .run-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 25px rgba(56, 189, 248, 0.35);
    }

    .run-btn:active {
      transform: translateY(0);
    }

    /* ===== MODAL for sequential commands ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 5, 15, 0.75);
      backdrop-filter: blur(8px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: rgba(10, 18, 38, 0.95);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 24px;
      width: 540px;
      max-width: 90vw;
      backdrop-filter: blur(30px);
      box-shadow: 0 25px 60px rgba(0, 0, 10, 0.5), 0 0 0 1px rgba(56, 189, 248, 0.05);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .seq-cmd-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .seq-cmd-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .seq-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .seq-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(99, 179, 237, 0.15);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-primary);
      outline: none;
    }

    .seq-input:focus {
      border-color: rgba(56, 189, 248, 0.4);
    }

    .seq-connector {
      font-size: 9px;
      color: var(--warn);
      text-align: center;
      padding: 2px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .seq-connector::before,
    .seq-connector::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(251, 191, 36, 0.2);
    }

    /* ===== PARALLEL MODE indicator ===== */
    .parallel-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(129, 140, 248, 0.08);
      border: 1px solid rgba(129, 140, 248, 0.2);
      border-radius: 7px;
      font-size: 10px;
      color: var(--accent2);
      flex-shrink: 0;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 12px;
      user-select: none;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--text-dim);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Tooltip */
    [data-tip] {
      position: relative;
    }

    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 18, 38, 0.95);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
    }

    /* Animations */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .history-entry {
      animation: slideIn 0.2s ease;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .cursor-blink {
      animation: blink 1s infinite;
      color: var(--accent);
    }

    .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 600;
    }

    .badge-blue {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 12px 2px;
    }

    /* Command queue bar */
    .queue-bar {
      padding: 6px 14px;
      background: rgba(251, 191, 36, 0.05);
      border-bottom: 1px solid rgba(251, 191, 36, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 10px;
    }

    .queue-tag {
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: var(--warn);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .queue-arrow {
      color: var(--text-dim);
    }

    .parallel-bar {
      padding: 6px 14px;
      background: rgba(129, 140, 248, 0.05);
      border-bottom: 1px solid rgba(129, 140, 248, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 10px;
    }

    .par-tag {
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(129, 140, 248, 0.1);
      border: 1px solid rgba(129, 140, 248, 0.2);
      color: var(--accent2);
    }

    /* Resize indicator */
    .pane-label {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="app-root">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

      <!-- TABS -->

          <span class="tab-close" onclick="event.stopPropagation();closeTab(2)">

        </button>
      </div>

      <!-- TOPBAR ACTIONS -->
      <div class="topbar-actions">
        <button class="icon-btn" data-tip="Toggle Sidebar" onclick="toggleSidebar()">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2" fill="none" />
            <path d="M5 1v12" stroke="currentColor" stroke-width="1.2" />
          </svg>
        </button>
        <button class="icon-btn" data-tip="Split Vertically" onclick="splitPane('vertical')">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2" fill="none" />
            <path d="M7 1v12" stroke="currentColor" stroke-width="1.2" />
          </svg>
        </button>
        <button class="icon-btn" data-tip="Split Horizontally" onclick="splitPane('horizontal')">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2" fill="none" />
            <path d="M1 7h12" stroke="currentColor" stroke-width="1.2" />
          </svg>
        </button>
        <button class="icon-btn" data-tip="Clear History" onclick="clearHistory()">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <path d="M2 4h10M5 4V3a1 1 0 011-1h2a1 1 0 011 1v1M6 6v5M8 6v5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">

      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span>Explorer</span>
          <span class="badge badge-blue">3</span>
        </div>
        <div class="sidebar-body" id="sidebarBody"></div>
      </div>

      <!-- TERMINAL AREA -->
      <div class="terminal-area">

        <!-- Execution queue indicators -->
        <div id="queueBar" class="queue-bar" style="display:none;"></div>
        <div id="parallelBar" class="parallel-bar" style="display:none;"></div>

        <!-- Split container -->
        <div class="split-container vertical" id="splitContainer">
          <!-- Pane 1 -->
          <div class="terminal-pane focused" id="pane1" onclick="focusPane(1)">
            <div class="pane-topbar">
              <svg width="10" height="10" viewBox="0 0 10 10">
                <circle cx="5" cy="5" r="4" fill="#38bdf8" opacity="0.5" />
              </svg>
              <span class="pane-title">Pane 1 — main shell</span>
              <button class="mini-btn" onclick="closePane(1)">
                <svg width="8" height="8" viewBox="0 0 8 8">
                  <path d="M1 1l6 6M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <div class="history-panel" id="historyPanel1"></div>
          </div>
        </div>

        <!-- COMMAND INPUT AREA (sticky to bottom) -->
        <div class="input-area" id="inputArea">
          <!-- Info row -->
          <div class="input-info-row">
            <div class="info-chip cwd">
              <svg width="10" height="10" viewBox="0 0 10 10">
                <path
                  d="M1 3.5A1.5 1.5 0 012.5 2h1.6L5.5 3.5H8.5A1.5 1.5 0 0110 5v3A1.5 1.5 0 018.5 9.5h-7A1.5 1.5 0 010 8V5a1.5 1.5 0 011-1.42V3.5z"
                  stroke="currentColor" stroke-width="1" fill="none" />
              </svg>
              <span id="cwdDisplay">~/projects/green-master</span>
            </div>
            <div class="info-chip branch">
              <svg width="10" height="10" viewBox="0 0 10 10">
                <circle cx="3" cy="2" r="1.5" stroke="currentColor" stroke-width="1" fill="none" />
                <circle cx="3" cy="8" r="1.5" stroke="currentColor" stroke-width="1" fill="none" />
                <circle cx="7.5" cy="5" r="1.5" stroke="currentColor" stroke-width="1" fill="none" />
                <path d="M3 3.5v3M3 3.5c0 1 1 1.5 1.5 1.5H6" stroke="currentColor" stroke-width="1" fill="none"
                  stroke-linecap="round" />
              </svg>
              <span id="branchDisplay">feat/websocket-v2</span>
            </div>
            <div class="info-chip mode" id="modeChip" style="display:none;">
              <svg width="10" height="10" viewBox="0 0 10 10">
                <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1" fill="none" />
                <path d="M5 3v2l1.5 1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
              </svg>
              <span id="modeText">SEQ</span>
            </div>
          </div>

          <!-- Suggestions -->
          <div class="suggestions-row" id="suggestionsRow"></div>

          <!-- Input row -->
          <div class="input-row">
            <span class="prompt-symbol">❯</span>
            <input class="cmd-input" id="cmdInput" type="text" placeholder="Type a command... (Tab to autocomplete)"
              autocomplete="off" spellcheck="false" onkeydown="handleInputKey(event)"
              oninput="handleInputChange(event)">
            <div class="exec-modes">
              <button class="mode-btn" id="seqBtn" data-tip="Sequential execution" onclick="toggleSeqMode()">
                <svg width="11" height="11" viewBox="0 0 11 11">
                  <path d="M1 2h9M1 5.5h9M1 9h9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                  <path d="M8 3.5l2-1.5-2-1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
                SEQ
              </button>
              <button class="mode-btn" id="parBtn" data-tip="Parallel execution" onclick="toggleParMode()">
                <svg width="11" height="11" viewBox="0 0 11 11">
                  <path d="M1 1v9M5.5 1v9M10 1v9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
                PAR
              </button>
            </div>
            <button class="run-btn" onclick="runCommand()">
              <svg width="12" height="12" viewBox="0 0 12 12">
                <path d="M2 2l8 4-8 4V2z" fill="currentColor" />
              </svg>
              Run
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SEQ MODAL -->
  <div class="modal-overlay" id="seqModal">
    <div class="modal">
      <div class="modal-title">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <path d="M2 3h12M2 8h12M2 13h12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        Sequential Command Queue
      </div>
      <div class="seq-cmd-list" id="seqCmdList"></div>
      <button class="tab-add-btn" onclick="addSeqCmd()"
        style="width:100%; justify-content: center; padding: 6px; margin-bottom:14px;">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M5 2v6M2 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        Add Command
      </button>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="mini-btn" onclick="closeSeqModal()">Cancel</button>
        <button class="run-btn" onclick="runSeqCommands()" style="font-size:11px; padding:6px 14px;">
          <svg width="11" height="11" viewBox="0 0 11 11">
            <path d="M1.5 1.5l8 4-8 4V1.5z" fill="currentColor" />
          </svg>
          Run Queue
        </button>
      </div>
    </div>

  <!-- PAR MODAL -->
  <div class="modal-overlay" id="parModal">
    <div class="modal">
      <div class="modal-title">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <path d="M2 2v12M8 2v12M14 2v12" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        Parallel Command Execution
      </div>
      <div class="seq-cmd-list" id="parCmdList"></div>
      <button class="tab-add-btn" onclick="addParCmd()"
        style="width:100%; justify-content: center; padding: 6px; margin-bottom:14px;">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M5 2v6M2 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        Add Parallel Command
      </button>
      <div style="display:flex; gap:8px; justify-content:flex-end; align-items:center;">
        <span style="font-size:9px; color: var(--text-muted);">Outputs merged with [cmd] label per line</span>
        <button class="mini-btn" onclick="closeParModal()">Cancel</button>
        <button class="run-btn" onclick="runParCommands()"
          style="font-size:11px; padding:6px 14px; background: linear-gradient(135deg, rgba(129,140,248,0.9), rgba(99,102,241,0.9));">
          <svg width="11" height="11" viewBox="0 0 11 11">
            <path d="M1.5 1.5v8M5.5 1.5v8M9.5 1.5v8" stroke="white" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          Run Parallel
        </button>
      </div>
    </div>
  </div>

  <script>
    // ===================== STATE =====================
    let tabs = [
      { id: 1, name: 'main shell', color: '#38bdf8' },
      { id: 2, name: 'dev server', color: '#818cf8' }
    ];
    let activeTab = 1;
    let nextTabId = 3;
    let sidebarOpen = true;
    let splitMode = null; // null, 'vertical', 'horizontal'
    let focusedPane = 1;
    let execMode = null; // null, 'seq', 'par'
    let seqCmds = ['', ''];
    let parCmds = ['', ''];
    let historyData = { 1: [], 2: [] };
    let cmdHistory = [];
    let historyIndex = -1;

    const suggestions = {
      default: ['npm run dev', 'git status', 'ls -la', 'pwd', 'git log --oneline', 'npm install'],
      git: ['git add .', 'git commit -m ""', 'git push', 'git pull', 'git checkout -b'],
      npm: ['npm run build', 'npm test', 'npm run lint', 'npm run format'],
      docker: ['docker ps', 'docker-compose up', 'docker-compose down', 'docker logs'],
    };

    const folders = [
      {
        name: 'Git Operations', icon: 'git', open: true,
        cmds: ['git status', 'git add .', 'git commit -m "chore: update"', 'git push origin', 'git pull origin', 'git log --oneline -10']
      },
      {
        name: 'NPM Scripts', icon: 'npm', open: false,
        cmds: ['npm run dev', 'npm run build', 'npm test', 'npm run lint', 'npm install', 'npm ci']
      },
      {
        name: 'Docker', icon: 'docker', open: false,
        cmds: ['docker ps', 'docker-compose up -d', 'docker-compose down', 'docker logs -f', 'docker exec -it bash']
      },
      {
        name: 'File System', icon: 'fs', open: false,
        cmds: ['ls -la', 'pwd', 'find . -name "*.js"', 'du -sh *', 'cat package.json', 'mkdir -p src/components']
      }
    ];

    const mockOutputs = {
      'git status': { status: 'success', lines: ['On branch feat/websocket-v2', 'Your branch is up to date.', '', 'Changes not staged for commit:', '  (use "git add <file>..." to update what will be committed)', '', '\tmodified:   src/terminal.js', '\tmodified:   public/index.html'] },
      'ls -la': { status: 'success', lines: ['total 48', 'drwxr-xr-x  8 user staff   256 Mar 12 14:30 .', 'drwxr-xr-x  3 user staff    96 Mar  1 09:00 ..', 'drwxr-xr-x 14 user staff   448 Mar 12 14:30 .git', '-rw-r--r--  1 user staff   421 Mar 10 11:00 package.json', '-rw-r--r--  1 user staff 12382 Mar 12 14:20 node_modules', 'drwxr-xr-x  4 user staff   128 Mar 12 14:30 src'] },
      'npm run dev': { status: 'running', lines: ['> neoterm@1.0.0 dev', '> vite --host', '', '  VITE v5.0.11  ready in 324 ms', '', '  ➜  Local:   http://localhost:5173/', '  ➜  Network: http://192.168.1.5:5173/'] },
      'npm run build': { status: 'success', lines: ['> neoterm@1.0.0 build', '> vite build', '', 'vite v5.0.11 building for production...', '✓ 84 modules transformed.', 'dist/index.html        0.46 kB │ gzip:  0.30 kB', 'dist/assets/index.js  142.35 kB │ gzip: 46.12 kB', '✓ built in 1.24s'] },
      'npm test': { status: 'error', lines: ['> neoterm@1.0.0 test', '> vitest run', '', ' FAIL  src/terminal.test.js', '  × WebSocket connect test', '    Error: ECONNREFUSED 127.0.0.1:5173', '', 'Tests failed: 1/8'] },
      'pwd': { status: 'success', lines: ['/Users/user/projects/green-master'] },
    };

    // ===================== SIDEBAR =====================
    function buildSidebar() {
      const body = document.getElementById('sidebarBody');
      body.innerHTML = '';

      const iconMap = {
        git: `<svg width="12" height="12" viewBox="0 0 12 12"><circle cx="9" cy="3" r="1.5" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="3" cy="3" r="1.5" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="3" cy="9" r="1.5" stroke="currentColor" stroke-width="1" fill="none"/><path d="M3 4.5v3M4.5 3h3M9 4.5c0 1.5-1.5 2-3 2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`,
        npm: `<svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="3" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1" fill="none"/><path d="M4 6h4M6 6v3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`,
        docker: `<svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="4" width="2" height="2" rx=".3" fill="currentColor" opacity=".6"/><rect x="4" y="4" width="2" height="2" rx=".3" fill="currentColor" opacity=".8"/><rect x="7" y="4" width="2" height="2" rx=".3" fill="currentColor"/><rect x="4" y="7" width="2" height="2" rx=".3" fill="currentColor" opacity=".5"/><path d="M1 7c1 2 8 2 10 0" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/></svg>`,
        fs: `<svg width="12" height="12" viewBox="0 0 12 12"><path d="M1.5 3.5A1 1 0 012.5 2.5h2l1 1h4A1 1 0 0110.5 4.5v5A1 1 0 019.5 10.5h-7A1 1 0 011.5 9.5V3.5z" stroke="currentColor" stroke-width="1" fill="none"/></svg>`,
      };

      folders.forEach((folder, fi) => {
        const div = document.createElement('div');
        div.className = 'folder-item';

        div.innerHTML = `
      <div class="folder-header ${folder.open ? 'open' : ''}" onclick="toggleFolder(${fi})">
        <svg width="8" height="8" viewBox="0 0 8 8" style="transform: rotate(${folder.open ? 90 : 0}deg); transition: transform 0.2s; flex-shrink:0">
          <path d="M2 1l4 3-4 3V1z" fill="currentColor"/>
        </svg>
        ${iconMap[folder.icon] || ''}
        <span class="folder-name">${folder.name}</span>
        <span class="folder-count">${folder.cmds.length}</span>
      </div>
      <div class="folder-commands ${folder.open ? 'open' : ''}" id="folder-cmds-${fi}">
        ${folder.cmds.map(cmd => `
          <div class="cmd-item" onclick="insertCommand('${cmd.replace(/'/g, "\\'")}')">
            <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 2l3 2-3 2V2z" fill="currentColor" opacity="0.5"/></svg>
            <span class="cmd-name">${cmd}</span>
            <span class="cmd-run">↵</span>
          </div>
        `).join('')}
      </div>
    `;
        body.appendChild(div);
      });
    }

    function toggleFolder(fi) {
      folders[fi].open = !folders[fi].open;
      buildSidebar();
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
    }

    function insertCommand(cmd) {
      document.getElementById('cmdInput').value = cmd;
      document.getElementById('cmdInput').focus();
      updateSuggestions(cmd);
    }

    // ===================== TABS =====================
    function addTab() {
      const id = nextTabId++;
      const colors = ['#38bdf8', '#818cf8', '#34d399', '#f87171', '#fbbf24', '#f472b6'];
      const color = colors[id % colors.length];
      tabs.push({ id, name: `shell ${id}`, color });
      historyData[id] = [];
      renderTabs();
      switchTab(id);
    }

    function closeTab(id) {
      if (tabs.length === 1) return;
      tabs = tabs.filter(t => t.id !== id);
      delete historyData[id];
      if (activeTab === id) switchTab(tabs[tabs.length - 1].id);
      else renderTabs();
    }

    function switchTab(id) {
      activeTab = id;
      renderTabs();
      renderHistory();
    }

    function renderTabs() {
      const bar = document.getElementById('tabBar');
      const addBtn = bar.querySelector('.tab-add-btn');
      bar.querySelectorAll('.tab').forEach(t => t.remove());

      tabs.forEach(tab => {
        const el = document.createElement('div');
        el.className = `tab ${tab.id === activeTab ? 'active' : ''}`;
        el.dataset.id = tab.id;
        el.onclick = () => switchTab(tab.id);
        el.innerHTML = `
      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="${tab.color}" opacity="0.6"/></svg>
      ${tab.name}
      <span class="tab-close" onclick="event.stopPropagation();closeTab(${tab.id})">
        <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
    `;
        bar.insertBefore(el, addBtn);
      });
    }

    // ===================== SPLIT PANES =====================
    function splitPane(direction) {
      const container = document.getElementById('splitContainer');
      const pane2 = document.getElementById('pane2');

      if (pane2) {
        // Already split — remove second pane
        pane2.remove();
        const divider = container.querySelector('.split-divider');
        if (divider) divider.remove();
        splitMode = null;
        return;
      }

      container.className = `split-container ${direction}`;
      splitMode = direction;

      const divider = document.createElement('div');
      divider.className = `split-divider ${direction === 'horizontal' ? 'horiz' : ''}`;
      container.appendChild(divider);

      const pane = document.createElement('div');
      pane.className = 'terminal-pane';
      pane.id = 'pane2';
      pane.onclick = () => focusPane(2);
      pane.innerHTML = `
    <div class="pane-topbar">
      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#818cf8" opacity="0.5"/></svg>
      <span class="pane-title">Pane 2</span>
      <button class="mini-btn" onclick="event.stopPropagation(); closePane(2)">
        <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="history-panel" id="historyPanel2">
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 36 36"><rect x="4" y="4" width="28" height="28" rx="6" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 14l5 4-5 4M18 22h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div class="empty-title">Pane 2</div>
        <div>Type commands and they'll appear here</div>
      </div>
    </div>
  `;
      container.appendChild(pane);
      focusPane(2);
    }

    function closePane(id) {
      if (id === 1) return;
      const pane = document.getElementById(`pane${id}`);
      const divider = document.querySelector('.split-divider');
      if (pane) pane.remove();
      if (divider) divider.remove();
      splitMode = null;
      focusPane(1);
    }

    function focusPane(id) {
      focusedPane = id;
      document.querySelectorAll('.terminal-pane').forEach(p => p.classList.remove('focused'));
      const pane = document.getElementById(`pane${id}`);
      if (pane) pane.classList.add('focused');
    }

    // ===================== HISTORY =====================
    function renderHistory() {
      const panel = document.getElementById(`historyPanel${focusedPane}`);
      if (!panel) return;

      const data = historyData[activeTab] || [];
      if (data.length === 0) {
        panel.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40"><rect x="4" y="4" width="32" height="32" rx="8" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M12 16l6 5-6 5M22 26h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div class="empty-title">NeoTerm</div>
        <div>Run a command to get started</div>
        <div style="margin-top:4px; color: var(--text-dim); font-size:10px;">Press ↑↓ to navigate history</div>
      </div>
    `;
        return;
      }

      panel.innerHTML = '';
      data.forEach((entry, i) => {
        panel.appendChild(createHistoryEntry(entry, i));
      });

      // Scroll to bottom
      panel.scrollTop = panel.scrollHeight;
    }

    function createHistoryEntry(entry, idx) {
      const div = document.createElement('div');
      div.className = `history-entry ${entry.expanded ? 'expanded' : ''}`;
      div.id = `entry-${entry.id}`;
      div.onclick = (e) => {
        if (e.target.closest('.mini-btn')) return;
        toggleEntry(entry.id);
      };

      const statusClass = { success: 'success', error: 'error', running: 'running', warn: 'warn' }[entry.status] || 'success';
      const statusLabel = { success: '✓ OK', error: '✗ ERR', running: '● RUN', warn: '⚠ WARN' }[entry.status] || 'OK';

      const timeAgo = formatTimeAgo(entry.ts);
      const duration = entry.duration ? `${entry.duration}ms` : '—';
      const execCount = entry.execCount || 1;

      let outputHtml = '';
      if (entry.output && entry.output.length > 0) {
        outputHtml = entry.output.map(line => {
          const cls = line.startsWith('Error') || line.startsWith('✗') || line.startsWith('×') ? ' err' :
            line.startsWith('>') || line.startsWith('➜') || line.startsWith('✓') ? ' info' : '';
          const src = entry.source ? `<span class="source-tag">[${entry.source}]</span>` : '';
          return `<div class="output-line${cls}">${src}${escHtml(line)}</div>`;
        }).join('');
      }

      div.innerHTML = `
    <div class="history-cmd-row">
      <span class="status-tag ${statusClass}">${statusLabel}</span>
      <span class="history-cmd-text">❯ ${escHtml(entry.cmd)}</span>
      <div class="history-meta">
        <div class="meta-pill">
          <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" stroke="currentColor" stroke-width="1" fill="none"/><path d="M4 2v2l1.5 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
          ${timeAgo}
        </div>
        <div class="meta-pill">
          <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 4h6M5 2l2 2-2 2" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${duration}
        </div>
        <div class="meta-pill" title="Times executed">
          <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l3 3-3 3M5 1l3 3-3 3" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ×${execCount}
        </div>
      </div>
      <div class="history-actions">
        <button class="mini-btn" title="Re-run" onclick="rerunCommand('${escHtml(entry.cmd).replace(/'/g, "\\'")}')">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5A3.5 3.5 0 105 1.5H3M3 1.5L1 3.5l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          Re-run
        </button>
        <button class="mini-btn" title="Insert to input" onclick="insertCommand('${entry.cmd.replace(/'/g, "\\'")}')">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5h6M6 3l2 2-2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="mini-btn danger" title="Delete" onclick="deleteEntry(${entry.id})">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 3h7M4 3V2h2v1M4 5v3M6 5v3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
        </button>
      </div>
    </div>
    <div class="history-output">
      <div class="history-output-inner">${outputHtml || '<span style="color:var(--text-dim)">No output</span>'}</div>
    </div>
  `;

      return div;
    }

    function toggleEntry(id) {
      const data = historyData[activeTab];
      const entry = data.find(e => e.id === id);
      if (entry) {
        entry.expanded = !entry.expanded;
        const el = document.getElementById(`entry-${id}`);
        if (el) el.classList.toggle('expanded', entry.expanded);
      }
    }

    function rerunCommand(cmd) {
      document.getElementById('cmdInput').value = cmd;
      runCommand();
    }

    function deleteEntry(id) {
      historyData[activeTab] = historyData[activeTab].filter(e => e.id !== id);
      const el = document.getElementById(`entry-${id}`);
      if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(-20px)'; setTimeout(() => el.remove(), 200); }
    }

    function clearHistory() {
      historyData[activeTab] = [];
      renderHistory();
    }

    let entryId = 1;

    function addHistoryEntry(cmd, status, output, duration, source) {
      const entry = {
        id: entryId++,
        cmd,
        status,
        output: output || [],
        ts: new Date(),
        duration,
        execCount: 1,
        expanded: true,
        source
      };

      // Check if same cmd exists (increment count)
      const existing = historyData[activeTab].find(e => e.cmd === cmd);
      if (existing) existing.execCount = (existing.execCount || 1) + 1;

      historyData[activeTab].push(entry);
      renderHistory();
      return entry;
    }

    // ===================== COMMAND EXECUTION =====================
    function runCommand() {
      const input = document.getElementById('cmdInput');
      const cmd = input.value.trim();
      if (!cmd) return;

      cmdHistory.unshift(cmd);
      historyIndex = -1;
      input.value = '';
      updateSuggestions('');

      const mock = mockOutputs[cmd] || {
        status: Math.random() > 0.2 ? 'success' : 'error',
        lines: [`$ ${cmd}`, `Command executed: ${cmd}`, `Exit code: ${Math.random() > 0.2 ? 0 : 1}`]
      };

      const duration = Math.floor(Math.random() * 2000) + 50;
      addHistoryEntry(cmd, mock.status, mock.lines, duration);
    }

    function handleInputKey(e) {
      if (e.key === 'Enter') { runCommand(); return; }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        historyIndex = Math.min(historyIndex + 1, cmdHistory.length - 1);
        if (cmdHistory[historyIndex]) document.getElementById('cmdInput').value = cmdHistory[historyIndex];
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        historyIndex = Math.max(historyIndex - 1, -1);
        document.getElementById('cmdInput').value = historyIndex >= 0 ? cmdHistory[historyIndex] : '';
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        const chips = document.querySelectorAll('.suggestion-chip');
        if (chips.length > 0) {
          document.getElementById('cmdInput').value = chips[0].dataset.cmd;
          updateSuggestions(chips[0].dataset.cmd);
        }
      }
    }

    function handleInputChange(e) {
      updateSuggestions(e.target.value);
    }

    function updateSuggestions(val) {
      const row = document.getElementById('suggestionsRow');
      row.innerHTML = '';

      let list = suggestions.default;
      if (val.startsWith('git')) list = suggestions.git;
      else if (val.startsWith('npm')) list = suggestions.npm;
      else if (val.startsWith('docker')) list = suggestions.docker;

      const filtered = val
        ? list.filter(s => s.includes(val) && s !== val).slice(0, 5)
        : list.slice(0, 5);

      if (filtered.length === 0 && val === '') {
        // Show recent from history
        cmdHistory.slice(0, 4).forEach(cmd => {
          const chip = document.createElement('span');
          chip.className = 'suggestion-chip';
          chip.dataset.cmd = cmd;
          chip.innerHTML = `<span class="suggestion-label">recent</span>${escHtml(cmd)}`;
          chip.onclick = () => { document.getElementById('cmdInput').value = cmd; };
          row.appendChild(chip);
        });
        return;
      }

      filtered.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'suggestion-chip';
        chip.dataset.cmd = s;
        chip.innerHTML = `<span class="suggestion-label">suggest</span>${escHtml(s)}`;
        chip.onclick = () => {
          document.getElementById('cmdInput').value = s;
          document.getElementById('cmdInput').focus();
          updateSuggestions(s);
        };
        row.appendChild(chip);
      });
    }

    // ===================== EXEC MODES =====================
    function toggleSeqMode() {
      if (execMode === 'seq') {
        execMode = null;
        document.getElementById('seqBtn').classList.remove('active-seq');
        document.getElementById('modeChip').style.display = 'none';
      } else {
        execMode = 'seq';
        document.getElementById('seqBtn').classList.add('active-seq');
        document.getElementById('parBtn').classList.remove('active-par');
        document.getElementById('modeChip').style.display = 'flex';
        document.getElementById('modeText').textContent = 'SEQ';
        openSeqModal();
      }
    }

    function toggleParMode() {
      if (execMode === 'par') {
        execMode = null;
        document.getElementById('parBtn').classList.remove('active-par');
        document.getElementById('modeChip').style.display = 'none';
      } else {
        execMode = 'par';
        document.getElementById('parBtn').classList.add('active-par');
        document.getElementById('seqBtn').classList.remove('active-seq');
        document.getElementById('modeChip').style.display = 'flex';
        document.getElementById('modeText').textContent = 'PAR';
        openParModal();
      }
    }

    // ===== SEQ MODAL =====
    function openSeqModal() {
      seqCmds = ['', ''];
      renderSeqList();
      document.getElementById('seqModal').classList.add('open');
    }
    function closeSeqModal() {
      document.getElementById('seqModal').classList.remove('open');
      execMode = null;
      document.getElementById('seqBtn').classList.remove('active-seq');
      document.getElementById('modeChip').style.display = 'none';
    }

    function addSeqCmd() {
      seqCmds.push('');
      renderSeqList();
    }

    function renderSeqList() {
      const list = document.getElementById('seqCmdList');
      list.innerHTML = '';
      seqCmds.forEach((cmd, i) => {
        if (i > 0) {
          const conn = document.createElement('div');
          conn.className = 'seq-connector';
          conn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1v8M3 7l2 2 2-2" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg> then`;
          list.appendChild(conn);
        }
        const row = document.createElement('div');
        row.className = 'seq-cmd-row';
        row.innerHTML = `
      <div class="seq-num">${i + 1}</div>
      <input class="seq-input" value="${escHtml(cmd)}" placeholder="Command ${i + 1}" oninput="seqCmds[${i}] = this.value">
      ${seqCmds.length > 2 ? `<button class="mini-btn danger" onclick="seqCmds.splice(${i},1); renderSeqList()"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>` : ''}
    `;
        list.appendChild(row);
      });
    }

    function runSeqCommands() {
      const cmds = seqCmds.filter(c => c.trim());
      if (!cmds.length) { closeSeqModal(); return; }

      closeSeqModal();

      // Show queue bar
      const qBar = document.getElementById('queueBar');
      qBar.style.display = 'flex';
      qBar.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" style="color:var(--warn)"><path d="M2 5h6M6 3l2 2-2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:var(--warn);font-weight:600">SEQ QUEUE:</span>` +
        cmds.map((c, i) => `${i > 0 ? '<span class="queue-arrow">→</span>' : ''}<span class="queue-tag">${escHtml(c)}</span>`).join('');

      // Run sequentially with delay
      let delay = 0;
      cmds.forEach((cmd, i) => {
        setTimeout(() => {
          const mock = mockOutputs[cmd] || {
            status: 'success',
            lines: [`[seq:${i + 1}] ${cmd}`, `Done.`]
          };
          const dur = Math.floor(Math.random() * 1500) + 200;
          addHistoryEntry(cmd, i < cmds.length - 1 ? mock.status : mock.status, mock.lines, dur);

          if (i === cmds.length - 1) {
            setTimeout(() => { qBar.style.display = 'none'; }, 2000);
          }
        }, delay);
        delay += 800;
      });
    }

    // ===== PAR MODAL =====
    function openParModal() {
      parCmds = ['', ''];
      renderParList();
      document.getElementById('parModal').classList.add('open');
    }
    function closeParModal() {
      document.getElementById('parModal').classList.remove('open');
      execMode = null;
      document.getElementById('parBtn').classList.remove('active-par');
      document.getElementById('modeChip').style.display = 'none';
    }

    function addParCmd() {
      parCmds.push('');
      renderParList();
    }

    function renderParList() {
      const list = document.getElementById('parCmdList');
      list.innerHTML = '';
      parCmds.forEach((cmd, i) => {
        const row = document.createElement('div');
        row.className = 'seq-cmd-row';
        row.innerHTML = `
      <div class="seq-num" style="background:rgba(129,140,248,0.15);border-color:rgba(129,140,248,0.3);color:var(--accent2)">${i + 1}</div>
      <input class="seq-input" value="${escHtml(cmd)}" placeholder="Parallel command ${i + 1}" oninput="parCmds[${i}] = this.value">
      ${parCmds.length > 2 ? `<button class="mini-btn danger" onclick="parCmds.splice(${i},1); renderParList()"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>` : ''}
    `;
        list.appendChild(row);
      });
    }

    function runParCommands() {
      const cmds = parCmds.filter(c => c.trim());
      if (!cmds.length) { closeParModal(); return; }

      closeParModal();

      // Show parallel bar
      const pBar = document.getElementById('parallelBar');
      pBar.style.display = 'flex';
      pBar.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" style="color:var(--accent2)"><path d="M2 2v6M5 2v6M8 2v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><span style="color:var(--accent2);font-weight:600">PARALLEL:</span>` +
        cmds.map(c => `<span class="par-tag">${escHtml(c)}</span>`).join('<span style="color:var(--text-dim)">‖</span>');

      // Merge outputs
      const allOutput = [];
      const colors = ['cmd1', 'cmd2', 'cmd3'];
      cmds.forEach((cmd, i) => {
        const mock = mockOutputs[cmd] || { lines: [`${cmd}`, `Finished.`] };
        mock.lines.forEach(line => allOutput.push({ line, source: `cmd${i + 1}:${cmd.slice(0, 10)}` }));
      });

      // Sort randomly to simulate parallel interleaving
      allOutput.sort(() => Math.random() - 0.5);

      const mergedOutput = allOutput.map(o => o.line);
      const entry = addHistoryEntry(
        cmds.join(' ‖ '),
        'success',
        allOutput.map(o => `[${o.source}] ${o.line}`),
        Math.floor(Math.random() * 2000) + 500
      );

      setTimeout(() => { pBar.style.display = 'none'; }, 2000);
    }

    // ===================== UTILS =====================
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatTimeAgo(ts) {
      const diff = (Date.now() - ts) / 1000;
      if (diff < 60) return `${Math.floor(diff)}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    // ===================== INIT =====================
    function init() {
      buildSidebar();
      updateSuggestions('');

      // Seed some history
      const seeds = [
        { cmd: 'git status', status: 'success', output: mockOutputs['git status'].lines, duration: 123 },
        { cmd: 'npm run dev', status: 'running', output: mockOutputs['npm run dev'].lines, duration: 324 },
      ];
      seeds.forEach(s => {
        const entry = { id: entryId++, cmd: s.cmd, status: s.status, output: s.output, ts: new Date(Date.now() - Math.random() * 60000), duration: s.duration, execCount: 1, expanded: false };
        historyData[1].push(entry);
      });
      renderHistory();
    }

    // Close modals on backdrop click
    document.getElementById('seqModal').addEventListener('click', function (e) {
      if (e.target === this) closeSeqModal();
    });
    document.getElementById('parModal').addEventListener('click', function (e) {
      if (e.target === this) closeParModal();
    });

    init();
  </script>
</body>

</html>
